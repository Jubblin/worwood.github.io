profile: # CSS: section.profile
  show: true
  order: 1
  title: Profile # CSS: .section-title h2
  description: | # CSS: .section-content .description.markdown
    A senior Technical Leader and Cloud Architect with deep expertise in cloud-native technologies, distributed systems, and platform engineering. They combine hands-on technical excellence with strategic vision, leading the design and delivery of complex infrastructure solutions across major cloud providers. With a proven track record of building and mentoring high-performing technical teams, they excel at translating business requirements into scalable, resilient architectures while maintaining a strong focus on developer experience and operational excellence. They are committed to technical innovation, continuous learning, and driving technical excellence through both individual contribution and technical leadership.

